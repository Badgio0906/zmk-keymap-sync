<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZMK Keymap Sync — roBa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e; --surface: #16213e; --border: #2d2d5e;
      --text: #e0e0e0; --muted: #9ca3af; --accent: #7c3aed; --accent-h: #6d28d9;
      --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
      --key-bg: #0f172a; --key-border: #334155; --key-hover: #1e293b; --key-mod: #1c1954;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .hidden { display: none !important; }

    /* Header */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 14px; }
    header h1 { font-size: 1.05rem; color: #a78bfa; font-weight: 700; white-space: nowrap; }
    .hdr-statuses { display: flex; gap: 14px; align-items: center; flex: 1; }
    .status-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-gray { background: #6b7280; } .dot-green { background: var(--green); }
    .dot-red { background: var(--red); } .dot-yellow { background: var(--yellow); }
    .status-label { font-size: 0.76rem; color: var(--muted); }

    /* Buttons */
    button { padding: 6px 13px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: opacity 0.15s; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-success { background: #059669; color: #fff; }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #b91c1c; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: #6b7280; }

    /* Main */
    main { flex: 1; display: flex; flex-direction: column; padding: 14px 20px; gap: 10px; }

    /* Layer tabs */
    .layer-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px; flex-wrap: wrap; align-items: center; }
    .layer-tabs-label { font-size: 0.72rem; color: var(--muted); margin-right: 4px; }
    .layer-tab { padding: 4px 11px; border-radius: 5px; cursor: pointer; font-size: 0.76rem; font-weight: 600; color: var(--muted); background: transparent; border: none; transition: all 0.12s; }
    .layer-tab:hover { color: var(--text); background: var(--border); }
    .layer-tab.active { background: var(--accent); color: #fff; }
    .layer-tab.dirty::after { content: ' •'; color: var(--yellow); }

    /* Keyboard card */
    .keyboard-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; overflow-x: auto; }
    .keyboard-canvas { position: relative; }

    /* Keys */
    .key {
      position: absolute; background: var(--key-bg); border: 1px solid var(--key-border);
      border-radius: 6px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; overflow: hidden; user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }
    .key:hover { background: var(--key-hover); border-color: var(--accent); z-index: 2; }
    .key.modified { background: var(--key-mod); border-color: #7c3aed88; }
    .key-label { font-size: 0.62rem; white-space: pre-line; line-height: 1.3; padding: 2px; color: var(--text); }
    .key-trans { color: #4b5563 !important; }

    /* Action bar */
    .action-bar { display: flex; gap: 8px; align-items: center; }
    .spacer { flex: 1; }
    .change-badge { font-size: 0.76rem; color: var(--yellow); }

    /* Log */
    .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .log-header h3 { font-size: 0.78rem; color: var(--muted); }
    .log-panel { background: #080816; border-radius: 5px; padding: 8px 10px; font-family: 'Consolas', monospace; font-size: 0.7rem; height: 120px; overflow-y: auto; line-height: 1.75; }
    .log-info { color: #93c5fd; } .log-ok { color: #6ee7b7; }
    .log-warn { color: #fcd34d; } .log-error { color: #fca5a5; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; width: 420px; max-width: 92vw; }
    .modal-box h2 { font-size: 0.98rem; margin-bottom: 14px; color: #c4b5fd; }
    .form-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; display: block; }
    input[type="password"], input[type="text"] {
      width: 100%; background: #080816; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 7px 11px; font-size: 0.83rem; margin-bottom: 10px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .hint { font-size: 0.72rem; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
    .hint a { color: #a78bfa; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- キー編集モーダル -->

    <p class="hint" id="key-modal-current" style="font-family:Consolas; margin-bottom:12px;"></p>

    <p class="hint">ZMK バインディング構文（<code>&amp;</code> から始まる形式）で入力してください</p>
    <div class="modal-actions">
      <button class="btn-ghost" id="key-modal-cancel">キャンセル</button>
      <button class="btn-primary" id="key-modal-ok">適用</button>
    </div>
  </div>
</div>

<!-- ヘッダー -->
<header>
  <h1>ZMK Keymap Sync</h1>
  <div class="hdr-statuses">
    <div class="status-item">
      <span class="dot dot-gray" id="gh-dot"></span>
      <span class="status-label" id="gh-status">GitHub 未接続</span>
    </div>
    <div class="status-item">
      <span class="dot dot-gray" id="dev-dot"></span>
      <span class="status-label" id="dev-status">デバイス 未接続</span>

  </div>
  <button class="btn-ghost" id="btn-settings" style="font-size:0.73rem">⚙ PAT設定</button>
  <button class="btn-ghost" id="btn-serial" style="font-size:0.73rem">⚡ USB 接続</button>
  <button class="btn-danger hidden" id="btn-disconnect" style="font-size:0.73rem">切断</button>
</header>

<!-- メイン -->
<main>
  <!-- レイヤータブ -->
  <div class="layer-tabs" id="layer-tabs">
    <span class="layer-tabs-label">Layer:</span>
  </div>

  <!-- キーボードキャンバス -->
  <div class="keyboard-card">
    <div class="keyboard-canvas" id="keyboard-canvas">
      <div style="color:var(--muted);font-size:0.85rem;padding:20px 0">
        PAT を設定してキーマップを読み込んでください
      </div>
    </div>
  </div>

  <!-- アクションバー -->
  <div class="action-bar">
    <button class="btn-ghost" id="btn-reload" style="font-size:0.75rem">↻ 再読み込み</button>
    <div class="spacer"></div>
    <span class="change-badge hidden" id="change-badge"></span>
    <button class="btn-success hidden" id="btn-save">💾 保存 (GitHub + 実機)</button>
  </div>

  <!-- ログ -->
  <div class="log-card">
    <div class="log-header">
      <h3>ログ</h3>
      <button class="btn-ghost" onclick="document.getElementById('log').innerHTML=''" style="font-size:0.68rem;padding:2px 7px">クリア</button>
    </div>
    <div class="log-panel" id="log"></div>
  </div>
</main>

<script>
'use strict';

// ─────────────────────────────────────────────
// 定数
// ─────────────────────────────────────────────
const OWNER        = 'Badgio0906';
const REPO         = 'zmk-config-roBa';
const KEYMAP_PATH  = 'config/roBa.keymap';
const LAYOUT_PATH  = 'config/roBa.json';
const BRANCH       = 'main';
const KEY_SCALE    = 60;  // px per 1U
const KEY_GAP      = 4;   // px

// ─────────────────────────────────────────────
// 状態
// ─────────────────────────────────────────────
const S = {
  pat:          localStorage.getItem('zmk_pat') || '',
  layoutKeys:   [],   // roBa.json の layout 配列
  layers:       [],   // [{name, bindings[], originalBindings[], dirty}]
  keymapRaw:    null,
  keymapSha:    null,
  currentLayer: 0,
  edits:        {},   // 'layerIdx:keyIdx' → newBinding
  transport:    null,
};

// ─────────────────────────────────────────────
// ロガー
// ─────────────────────────────────────────────
function log(msg, cls = 'log-info') {
  const el = document.getElementById('log');
  const d  = document.createElement('div');
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ─────────────────────────────────────────────
// GitHub API
// ─────────────────────────────────────────────
async function ghFetch(path, opts = {}) {
  const res = await fetch(`https://api.github.com${path}`, {
    headers: {
      Authorization: `Bearer ${S.pat}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...opts.headers,
    },
    ...opts,
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`GitHub ${res.status}: ${body.slice(0, 200)}`);
  }
  return res.json();
}

async function ghGetFile(path) {
  const data    = await ghFetch(`/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`);
  const content = atob(data.content.replace(/\s/g, ''));
  return { content, sha: data.sha };
}

async function ghPutFile(path, content, sha, message) {
  // UTF-8 対応の base64 エンコード
  const b64 = btoa(encodeURIComponent(content).replace(/%([0-9A-F]{2})/g,
    (_, p) => String.fromCharCode(parseInt(p, 16))));
  return ghFetch(`/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify({ message, content: b64, sha, branch: BRANCH }),
  });
}

// ─────────────────────────────────────────────
// Keymapパーサー
// ─────────────────────────────────────────────
function parseKeymap(content) {
  // keymap { } ブロックを特定
  const keymapIdx = content.indexOf('keymap {');
  if (keymapIdx === -1) return [];

  // keymap ブロックの終端を検索（括弧の深さで追跡）
  let depth = 0, keymapEnd = -1;
  for (let i = keymapIdx; i < content.length; i++) {
    if (content[i] === '{') depth++;
    else if (content[i] === '}' && --depth === 0) { keymapEnd = i; break; }
  }
  if (keymapEnd === -1) return [];

  const keymapBody = content.slice(keymapIdx, keymapEnd + 1);
  const layers = [];

  // レイヤーブロック: "    word {" パターン（ネストなし: [^{}]*）
  const layerRe = /\n\s{4,12}(\w+)\s*\{([^{}]*)\}/g;
  let m;
  while ((m = layerRe.exec(keymapBody)) !== null) {
    const name = m[1];
    const body = m[2];

    // sensor-bindings を除いた bindings = <...> を取得
    const bindRe = /(?<![a-z-])bindings\s*=\s*<([\s\S]*?)>/;
    const bm = bindRe.exec(body);
    if (!bm) continue;

    const bindings = parseBindings(bm[1]);
    if (bindings.length === 0) continue;

    layers.push({
      name,
      bindings:         [...bindings],
      originalBindings: [...bindings],
      dirty: false,
    });
  }

  return layers;
}

function parseBindings(text) {
  // "&" 始まりのトークンを区切りとして binding を分割
  const tokens   = text.trim().split(/\s+/).filter(t => t.length > 0);
  const bindings = [];
  let cur = null;
  for (const t of tokens) {
    if (t.startsWith('&')) {
      if (cur !== null) bindings.push(cur);
      cur = t;
    } else if (cur !== null) {
      cur += ' ' + t;
    }
  }
  if (cur !== null) bindings.push(cur);
  return bindings;
}

// ─────────────────────────────────────────────
// Keymap再構築
// ─────────────────────────────────────────────
function reconstructKeymap(original, layers) {
  let content = original;
  for (const layer of layers) {
    if (!layer.dirty) continue;
    content = replaceLayerBindings(content, layer.name, layer.bindings);
  }
  return content;
}

function replaceLayerBindings(content, layerName, newBindings) {
  // "layerName {" の位置を特定
  const layerIdx = content.search(new RegExp('\\b' + layerName + '\\s*\\{'));
  if (layerIdx === -1) return content;

  // その後の bindings = < を検索（sensor-bindings は除外）
  let pos = layerIdx;
  while (pos < content.length) {
    const bi = content.indexOf('bindings = <', pos);
    if (bi === -1) break;

    const lookback = content.slice(Math.max(0, bi - 8), bi);
    if (lookback.includes('sensor')) { pos = bi + 1; continue; }

    const openAngle  = content.indexOf('<', bi) + 1;
    const closeAngle = content.indexOf('>;', openAngle);
    if (closeAngle === -1) break;

    // バインディングを1行1エントリ形式で再構築
    const newText = '\n' + newBindings.join('\n') + '\n            ';
    return content.slice(0, openAngle) + newText + content.slice(closeAngle);
  }
  return content;
}

// ─────────────────────────────────────────────
// キーラベル表示
// ─────────────────────────────────────────────
const KEY_ALIAS = {
  LEFT_WIN: 'Win', LEFT_ALT: 'Alt', LEFT_SHIFT: 'Shift', LCTRL: 'Ctrl', LEFT_CTRL: 'Ctrl',
  RIGHT_SHIFT: 'RShft', RIGHT_ALT: 'RAlt', RCTRL: 'RCtrl', RIGHT_CTRL: 'RCtrl',
  BACKSPACE: 'BkSp', SPACE: 'Space', ENTER: 'Enter', ESCAPE: 'Esc', DELETE: 'Del', TAB: 'Tab',
  LEFT_ARROW: '←', RIGHT_ARROW: '→', UP_ARROW: '↑', DOWN_ARROW: '↓',
  PAGE_UP: 'PgUp', PAGE_DOWN: 'PgDn', HOME: 'Home', END: 'End',
  LEFT_PARENTHESIS: '(', RIGHT_PARENTHESIS: ')',
  LEFT_BRACKET: '[', RIGHT_BRACKET: ']',
  LEFT_BRACE: '{', RIGHT_BRACE: '}',
  SINGLE_QUOTE: "'", APOS: "'", SEMICOLON: ';', COMMA: ',', PERIOD: '.',
  SLASH: '/', BACKSLASH: '\\', MINUS: '-', EQUAL: '=', GRAVE: '`',
  EXCLAMATION: '!', AT_SIGN: '@', HASH: '#', DOLLAR: '$', PERCENT: '%',
  CARET: '^', AMPERSAND: '&', ASTERISK: '*', UNDERSCORE: '_', TILDE: '~', PIPE: '|',
  NUMBER_0:'0',NUMBER_1:'1',NUMBER_2:'2',NUMBER_3:'3',NUMBER_4:'4',
  NUMBER_5:'5',NUMBER_6:'6',NUMBER_7:'7',NUMBER_8:'8',NUMBER_9:'9',
  KP_NUMBER_0:'KP0',KP_NUMBER_1:'KP1',KP_NUMBER_2:'KP2',KP_NUMBER_3:'KP3',
  KP_NUMBER_4:'KP4',KP_NUMBER_5:'KP5',KP_NUMBER_6:'KP6',KP_NUMBER_7:'KP7',
  KP_NUMBER_8:'KP8',KP_NUMBER_9:'KP9',
  INT1:'¥', LS_SEMI: '+', LS_EQUAL: '+',
};

function fmtKey(k) {
  if (!k) return '';
  // LC(X) / LA(X) / LS(X) / LG(X) 等のネスト修飾子
  const modM = k.match(/^([LR][CAGS])\((.+)\)$/);
  if (modM) {
    const map = { LC:'C-',LA:'A-',LS:'S-',LG:'G-',RC:'C-',RA:'A-',RS:'S-',RG:'G-' };
    return (map[modM[1]] || '') + fmtKey(modM[2]);
  }
  return KEY_ALIAS[k] ?? k;
}

function formatBinding(b) {
  if (!b || b === '&trans') return { label: '▽', cls: 'key-trans' };
  if (b === '&none') return { label: '✕', cls: 'key-trans' };
  if (b === '&bootloader') return { label: 'BOOT', cls: '' };

  const m = b.match(/^&(\S+)(?:\s+(.*))?$/);
  if (!m) return { label: b.slice(0, 10), cls: '' };
  const [, beh, rest] = m;
  const args = rest ? rest.trim().split(/\s+/) : [];

  let label;
  switch (beh) {
    case 'kp':  label = fmtKey(args[0] || ''); break;
    case 'mt':  label = `${fmtKey(args[0])}\n${fmtKey(args[1])}`; break;
    case 'lt':  label = `▲${args[0]}\n${fmtKey(args[1])}`; break;
    case 'mo':  label = `▲${args[0]}`; break;
    case 'to':  label = `→${args[0]}`; break;
    case 'tog': label = `⇄${args[0]}`; break;
    case 'mkp': label = ({MB1:'M1',MB2:'M2',MB3:'M3'})[args[0]] ?? args[0]; break;
    case 'bt': {
      if (args[0] === 'BT_SEL')     label = `BT${args[1]}`;
      else if (args[0] === 'BT_CLR') label = 'BTCLR';
      else if (args[0] === 'BT_CLR_ALL') label = 'BTCLA';
      else label = `BT:${args[0]}`;
      break;
    }
    default: label = `&${beh}`;
  }
  return { label, cls: '' };
}

// ─────────────────────────────────────────────
// キーボードレンダラー
// ─────────────────────────────────────────────
function renderKeyboard() {
  const canvas = document.getElementById('keyboard-canvas');
  const layer  = S.layers[S.currentLayer];
  if (!layer || !S.layoutKeys.length) return;

  const maxX = Math.max(...S.layoutKeys.map(k => k.x)) + 1;
  const maxY = Math.max(...S.layoutKeys.map(k => k.y)) + 1.2;
  canvas.style.width  = Math.ceil(maxX * KEY_SCALE) + 'px';
  canvas.style.height = Math.ceil(maxY * KEY_SCALE) + 'px';
  canvas.innerHTML = '';

  S.layoutKeys.forEach((kp, idx) => {
    const binding  = layer.bindings[idx] ?? '?';
    const editKey  = `${S.currentLayer}:${idx}`;
    const modified = !!S.edits[editKey];
    const { label, cls } = formatBinding(binding);

    const div = document.createElement('div');
    div.className = 'key' + (modified ? ' modified' : '');
    div.style.left   = (kp.x * KEY_SCALE) + 'px';
    div.style.top    = (kp.y * KEY_SCALE) + 'px';
    div.style.width  = (KEY_SCALE - KEY_GAP) + 'px';
    div.style.height = (KEY_SCALE - KEY_GAP) + 'px';

    if (kp.r) {
      const ox = (kp.rx - kp.x) * KEY_SCALE;
      const oy = (kp.ry - kp.y) * KEY_SCALE;
      div.style.transformOrigin = `${ox}px ${oy}px`;
      div.style.transform = `rotate(${kp.r}deg)`;
    }

    const span = document.createElement('span');
    span.className = 'key-label' + (cls ? ' ' + cls : '');
    span.textContent = label;
    div.appendChild(span);
    div.title    = binding;
    div.dataset.idx = idx;
    div.addEventListener('click', () => openKeyEdit(idx, binding));
    canvas.appendChild(div);
  });
}

// ─────────────────────────────────────────────
// レイヤータブ
// ─────────────────────────────────────────────
function renderLayerTabs() {
  const container = document.getElementById('layer-tabs');
  [...container.querySelectorAll('.layer-tab')].forEach(el => el.remove());

  S.layers.forEach((layer, idx) => {
    const btn = document.createElement('button');
    btn.className = 'layer-tab' + (idx === S.currentLayer ? ' active' : '') + (layer.dirty ? ' dirty' : '');
    btn.textContent = `${idx}: ${layer.name}`;
    btn.addEventListener('click', () => { S.currentLayer = idx; renderLayerTabs(); renderKeyboard(); });
    container.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
// キー編集モーダル
// ─────────────────────────────────────────────
let editingKeyIdx = null;

function openKeyEdit(keyIdx, current) {
  editingKeyIdx = keyIdx;
  document.getElementById('key-modal-current').textContent = `現在: ${current}`;
  const inp = document.getElementById('key-modal-input');
  inp.value = current;
  document.getElementById('key-modal').classList.remove('hidden');
  inp.select();
  inp.focus();
}

document.getElementById('key-modal-cancel').addEventListener('click', closeKeyModal);
document.getElementById('key-modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyKeyEdit();
  if (e.key === 'Escape') closeKeyModal();
});
document.getElementById('key-modal-ok').addEventListener('click', applyKeyEdit);

function closeKeyModal() {
  document.getElementById('key-modal').classList.add('hidden');
  editingKeyIdx = null;
}

function applyKeyEdit() {
  const newBinding = document.getElementById('key-modal-input').value.trim();
  if (!newBinding || editingKeyIdx === null) return;

  const editKey = `${S.currentLayer}:${editingKeyIdx}`;
  const layer   = S.layers[S.currentLayer];

  layer.bindings[editingKeyIdx] = newBinding;
  layer.dirty = layer.bindings.some((b, i) => b !== layer.originalBindings[i]);

  if (newBinding === layer.originalBindings[editingKeyIdx]) {
    delete S.edits[editKey];
  } else {
    S.edits[editKey] = newBinding;
  }

  closeKeyModal();
  renderLayerTabs();
  renderKeyboard();
  updateChangeBadge();
}

function updateChangeBadge() {
  const count   = Object.keys(S.edits).length;
  const badge   = document.getElementById('change-badge');
  const saveBtn = document.getElementById('btn-save');

  if (count > 0) {
    badge.textContent = `${count} 件の変更あり`;
    badge.classList.remove('hidden');
    saveBtn.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
    saveBtn.classList.add('hidden');
  }
}

// ─────────────────────────────────────────────
// ZMK RPC（T-1 から移植）
// ─────────────────────────────────────────────
const SOF = 0xAB, ESC_B = 0xAC, EOF_B = 0xAD;

function encodeFrame(data) {
  const out = [SOF];
  for (const b of data) {
    if (b === SOF || b === ESC_B || b === EOF_B) out.push(ESC_B, b);
    else out.push(b);
  }
  out.push(EOF_B);
  return new Uint8Array(out);
}

class FrameDecoder {
  constructor() { this.buf = []; this.inFrame = false; this.esc = false; }
  push(bytes) {
    const frames = [];
    for (const b of bytes) {
      if (this.esc) {
        if (this.inFrame) this.buf.push(b);
        this.esc = false;
      } else if (b === ESC_B) {
        this.esc = true;
      } else if (b === SOF) {
        this.buf = []; this.inFrame = true;
      } else if (b === EOF_B) {
        if (this.inFrame && this.buf.length > 0) frames.push(new Uint8Array(this.buf));
        this.buf = []; this.inFrame = false;
      } else if (this.inFrame) {
        this.buf.push(b);
      }
    }
    return frames;
  }
}

async function serialRpc(packet, timeoutMs = 3000) {
  const { port } = S.transport;
  const writer   = port.writable.getWriter();
  const reader   = port.readable.getReader();
  const decoder  = new FrameDecoder();
  try {
    await writer.write(packet);
    writer.releaseLock();
    const deadline = Date.now() + timeoutMs;
    while (Date.now() < deadline) {
      const TIMEOUT = Symbol();
      const { value, done } = await Promise.race([
        reader.read(),
        new Promise(r => setTimeout(() => r({ done: false, value: TIMEOUT }), 300)),
      ]);
      if (done) break;
      if (value === TIMEOUT) continue;
      const frames = decoder.push(value);
      if (frames.length > 0) { reader.releaseLock(); return frames[0]; }
    }
    reader.releaseLock();
    return null;
  } catch (err) {
    try { reader.releaseLock(); } catch (_) {}
    throw err;
  }
}

// SetLayerBinding RPC パケット構築
function buildSetLayerBinding(reqId, layerId, keyPos, behaviorId, param1, param2) {
  // BehaviorBinding: field1=behaviorId(sint32/zigzag), field2=param1, field3=param2
  const bb = [];
  const zz = behaviorId >= 0 ? behaviorId * 2 : (-behaviorId * 2) - 1;
  bb.push(0x08); pushVarint(bb, zz);
  if (param1) { bb.push(0x10); pushVarint(bb, param1); }
  if (param2) { bb.push(0x18); pushVarint(bb, param2); }

  // SetLayerBindingRequest: field1=layerId, field2=keyPosition, field3=binding
  const slb = [];
  if (layerId > 0) { slb.push(0x08); pushVarint(slb, layerId); }
  slb.push(0x10); pushVarint(slb, keyPos);
  slb.push(0x1A, bb.length, ...bb);

  // KeymapRequest: field2=setLayerBinding
  const km = [0x12, slb.length, ...slb];

  // Request: field1=requestId, field5=keymap
  const payload = [];
  payload.push(0x08); pushVarint(payload, reqId);
  payload.push(0x2A, km.length, ...km);

  return encodeFrame(new Uint8Array(payload));
}

function pushVarint(arr, v) {
  while (v > 0x7F) { arr.push((v & 0x7F) | 0x80); v >>>= 7; }
  arr.push(v & 0x7F);
}

// ─────────────────────────────────────────────
// Protobuf デコーダー（最小実装）
// ─────────────────────────────────────────────
function decodeVarint(bytes, pos) {
  let v = 0, shift = 0;
  while (pos < bytes.length) {
    const b = bytes[pos++];
    v |= (b & 0x7F) << shift;
    shift += 7;
    if (!(b & 0x80)) return { v, pos };
  }
  return { v, pos };
}

// bytes から {field, wire, value} の配列を返す
// wire=0: value は number, wire=2: value は Uint8Array
function protoFields(bytes) {
  const out = [];
  let pos = 0;
  while (pos < bytes.length) {
    const before = pos;
    const { v: tag, pos: p1 } = decodeVarint(bytes, pos);
    if (p1 === before) break;
    pos = p1;
    const field = tag >>> 3;
    const wire  = tag & 7;
    if (wire === 0) {
      const { v, pos: p2 } = decodeVarint(bytes, pos);
      pos = p2;
      out.push({ field, wire, value: v });
    } else if (wire === 2) {
      const { v: len, pos: p2 } = decodeVarint(bytes, pos);
      pos = p2;
      out.push({ field, wire, value: bytes.slice(pos, pos + len) });
      pos += len;
    } else {
      break; // wire 1/5 (64bit/32bit) は未対応、停止
    }
  }
  return out;
}

const pGet    = (fields, n) => fields.find(f => f.field === n);
const pGetAll = (fields, n) => fields.filter(f => f.field === n);
// sint32 の zigzag デコード
const zigzag  = n => (n & 1) ? -((n + 1) >> 1) : n >> 1;

// ─────────────────────────────────────────────
// GetKeymap RPC（実機から behaviorId を取得するため）
// ─────────────────────────────────────────────
function buildGetKeymapRequest(reqId) {
  // KeymapRequest: field1 = get_keymap (bool true)
  // field1 tag: (1<<3)|0 = 0x08, value 0x01
  const kmPayload = [0x08, 0x01];
  const req = [];
  req.push(0x08); pushVarint(req, reqId);            // requestId (field1)
  req.push(0x2A, kmPayload.length, ...kmPayload);    // keymap (field5, wire2)
  return encodeFrame(new Uint8Array(req));
}

// GetKeymap レスポンスをパースして Map<"layerIdx:keyIdx", {behaviorId,param1,param2}> を返す
//
// ZMK RPC レスポンスの2層構造:
//   RpcResponse { field1(wire2): RequestResponse { field1: requestId, field5: KeymapResponse } }
function parseGetKeymapResponse(frame) {
  const map = new Map();
  const rf  = protoFields(frame);

  // 最外層: field 1 (wire 2) = RequestResponse ラッパー
  const rrF = pGet(rf, 1);
  if (!rrF?.value) {
    log(`  parse(L1): fields=${rf.map(f=>`f${f.field}w${f.wire}`).join(',')}`, 'log-warn');
    return map;
  }

  const rrRf = protoFields(rrF.value);
  // L2: RequestResponse の全フィールドを常に表示
  log(`  L2 fields: ${rrRf.map(f=>`f${f.field}w${f.wire}`).join(', ')}`, 'log-info');

  // RequestResponse: field5 = KeymapResponse
  const kmF = pGet(rrRf, 5);
  if (!kmF?.value) {
    log('  parse(L2): field5 なし → 全フィールドを確認してください', 'log-warn');
    return map;
  }

  const kmRf = protoFields(kmF.value);
  log(`  L3 fields: ${kmRf.map(f=>`f${f.field}w${f.wire}`).join(', ')}`, 'log-info');

  // KeymapResponse: field1 = GetKeymapResponse
  const gkmF = pGet(kmRf, 1);
  if (!gkmF?.value) {
    log('  parse(L3): field1 なし → KeymapResponse の構造が異なります', 'log-warn');
    return map;
  }

  const gkmRf   = protoFields(gkmF.value);
  // GetKeymapResponse: field1 = layers (repeated)
  const layerFs = pGetAll(gkmRf, 1);

  layerFs.forEach((lf, li) => {
    if (!lf.value) return;
    const lrf = protoFields(lf.value);

    // KeymapLayer: field1 = id (省略時0), field2 = props(空), field3 = bindings
    const lidF     = pGet(lrf, 1);
    const layerIdx = lidF ? lidF.value : li;
    const bindFs   = pGetAll(lrf, 3);

    bindFs.forEach((bf, ki) => {
      if (!bf.value) return;
      const brf  = protoFields(bf.value);
      const bidF = pGet(brf, 1);
      const p1F  = pGet(brf, 2);
      const p2F  = pGet(brf, 3);
      if (bidF !== undefined) {
        map.set(`${layerIdx}:${ki}`, {
          behaviorId: zigzag(bidF.value),
          param1: p1F ? p1F.value : 0,
          param2: p2F ? p2F.value : 0,
        });
      }
    });
  });

  return map;
}

// &kp 用 HID キーコード
const HID_KP = {
  A:4,B:5,C:6,D:7,E:8,F:9,G:10,H:11,I:12,J:13,K:14,L:15,M:16,
  N:17,O:18,P:19,Q:20,R:21,S:22,T:23,U:24,V:25,W:26,X:27,Y:28,Z:29,
  NUMBER_1:30,NUMBER_2:31,NUMBER_3:32,NUMBER_4:33,NUMBER_5:34,
  NUMBER_6:35,NUMBER_7:36,NUMBER_8:37,NUMBER_9:38,NUMBER_0:39,
  N1:30,N2:31,N3:32,N4:33,N5:34,N6:35,N7:36,N8:37,N9:38,N0:39,
  ENTER:40,ESCAPE:41,BACKSPACE:42,TAB:43,SPACE:44,
  MINUS:45,EQUAL:46,LEFT_BRACKET:47,RIGHT_BRACKET:48,
  BACKSLASH:49,SEMICOLON:51,SINGLE_QUOTE:52,GRAVE:53,
  COMMA:54,PERIOD:55,SLASH:56,
  F1:58,F2:59,F3:60,F4:61,F5:62,F6:63,F7:64,F8:65,F9:66,F10:67,F11:68,F12:69,
  DELETE:76,HOME:74,END:77,PAGE_UP:75,PAGE_DOWN:78,
  RIGHT_ARROW:79,LEFT_ARROW:80,DOWN_ARROW:81,UP_ARROW:82,
};

// ─────────────────────────────────────────────
// WebSerial
// ─────────────────────────────────────────────
document.getElementById('btn-serial').addEventListener('click', async () => {
  try {
    if (!navigator.serial) throw new Error('WebSerial 非対応（Chrome/Edge が必要です）');
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    S.transport = { type: 'serial', port };
    setDevStatus(true, 'USB Serial 接続中');
    document.getElementById('btn-serial').classList.add('hidden');
    document.getElementById('btn-disconnect').classList.remove('hidden');
    log('Serial 接続完了', 'log-ok');
  } catch (err) {
    log(`Serial エラー: ${err.message}`, 'log-error');
  }
});

document.getElementById('btn-disconnect').addEventListener('click', async () => {
  if (!S.transport) return;
  try { await S.transport.port.close(); } catch (_) {}
  S.transport = null;
  setDevStatus(false, 'デバイス 未接続');
  document.getElementById('btn-serial').classList.remove('hidden');
  document.getElementById('btn-disconnect').classList.add('hidden');
  log('切断しました', 'log-warn');
});

function setDevStatus(connected, label) {
  document.getElementById('dev-dot').className   = `dot ${connected ? 'dot-green' : 'dot-gray'}`;
  document.getElementById('dev-status').textContent = label;
}
function setGhStatus(connected, label) {
  document.getElementById('gh-dot').className    = `dot ${connected ? 'dot-green' : 'dot-red'}`;
  document.getElementById('gh-status').textContent = label;
}

// ─────────────────────────────────────────────
// 保存
// ─────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  if (!S.pat) { log('PAT が設定されていません', 'log-error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    // 1. keymap 再構築
    log('keymap を再構築中...', 'log-info');
    const newContent = reconstructKeymap(S.keymapRaw, S.layers);

    // 2. GitHub PUT
    log('GitHub にプッシュ中...', 'log-info');
    const changed    = S.layers.filter(l => l.dirty).map(l => l.name).join(', ');
    const commitMsg  = `keymap: update ${changed} via zmk-keymap-sync`;
    await ghPutFile(KEYMAP_PATH, newContent, S.keymapSha, commitMsg);
    log('✓ GitHub プッシュ完了 → GitHub Actions ビルド開始', 'log-ok');
    log(`  確認: https://github.com/${OWNER}/${REPO}/actions`, 'log-info');

    // 3. 実機書き込み（接続中の場合のみ）
    if (S.transport) {
      log('実機に書き込み中...', 'log-info');
      await writeToDevice();
    } else {
      log('デバイス未接続のため実機書き込みスキップ', 'log-warn');
    }

    // 4. 状態リセット
    for (const layer of S.layers) {
      layer.originalBindings = [...layer.bindings];
      layer.dirty = false;
    }
    S.edits = {};

    // SHA を更新（次回保存用）
    const { sha } = await ghGetFile(KEYMAP_PATH);
    S.keymapSha = sha;

    renderLayerTabs();
    updateChangeBadge();
    log('✓ 保存完了！', 'log-ok');

  } catch (err) {
    log(`保存エラー: ${err.message}`, 'log-error');
  } finally {
    btn.disabled    = false;
    btn.textContent = '💾 保存 (GitHub + 実機)';
    updateChangeBadge();
  }
});

async function writeToDevice() {
  // 1. GetKeymap で実機の現在バインディング（＝実際の behaviorId）を取得
  log('実機キーマップを読み取り中 (GetKeymap)...', 'log-info');
  const gmPkt  = buildGetKeymapRequest(50);
  const gmResp = await serialRpc(gmPkt, 6000);

  if (!gmResp) {
    log('GetKeymap タイムアウト — 実機書き込みをスキップします', 'log-warn');
    return;
  }

  const deviceBindings = parseGetKeymapResponse(gmResp);
  log(`GetKeymap: ${gmResp.length} bytes → ${deviceBindings.size} バインディング取得`, 'log-ok');

  if (deviceBindings.size === 0) {
    // デバッグ用: 先頭バイトとフィールド構造を出力
    const hex = Array.from(gmResp.slice(0, 32)).map(b => b.toString(16).padStart(2,'0')).join(' ');
    log(`  raw[0..32]: ${hex}`, 'log-warn');
    log('⚠ パース結果が空です。実機書き込みをスキップします', 'log-warn');
    return;
  }

  // 2. 変更キーを書き込む
  let reqId = 100;
  for (const [editKey, newBinding] of Object.entries(S.edits)) {
    const [layerIdx, keyIdx] = editKey.split(':').map(Number);

    const kpMatch = newBinding.match(/^&kp\s+(\w+)$/);
    if (!kpMatch) {
      log(`${newBinding} は実機書き込み未対応（GitHub のみ更新済み）`, 'log-warn');
      continue;
    }

    const keycode = HID_KP[kpMatch[1]];
    if (keycode === undefined) {
      log(`キーコード不明: ${kpMatch[1]} — スキップ`, 'log-warn');
      continue;
    }

    // 実機の同じ位置から behaviorId を取得（ハードコードせず実値を使う）
    const current = deviceBindings.get(editKey);
    if (!current) {
      log(`layer=${layerIdx} key=${keyIdx}: device binding not found — スキップ`, 'log-warn');
      continue;
    }

    // ZMK param1 = (HID_USAGE_KEY_PAGE=0x07 << 16) | hid_keycode
    const zmkParam1 = (0x07 << 16) | keycode;
    const pkt  = buildSetLayerBinding(reqId++, layerIdx, keyIdx, current.behaviorId, zmkParam1, 0);
    const resp = await serialRpc(pkt);
    log(
      `SetLayerBinding layer=${layerIdx} key=${keyIdx} ${newBinding} (id=${current.behaviorId} param1=0x${zmkParam1.toString(16)}): ${resp ? 'OK' : 'タイムアウト'}`,
      resp ? 'log-ok' : 'log-warn',
    );
  }
}

// ─────────────────────────────────────────────
// PAT 設定
// ─────────────────────────────────────────────
document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('pat-input').value = S.pat;
  document.getElementById('pat-cancel').classList.remove('hidden');
  document.getElementById('pat-modal').classList.remove('hidden');
});

document.getElementById('pat-cancel').addEventListener('click', () => {
  document.getElementById('pat-modal').classList.add('hidden');
});

document.getElementById('pat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pat-save').click();
});

document.getElementById('pat-save').addEventListener('click', async () => {
  const pat = document.getElementById('pat-input').value.trim();
  if (!pat) return;
  S.pat = pat;
  localStorage.setItem('zmk_pat', pat);
  document.getElementById('pat-modal').classList.add('hidden');
  await loadData();
});

// ─────────────────────────────────────────────
// 再読み込み
// ─────────────────────────────────────────────
document.getElementById('btn-reload').addEventListener('click', loadData);

// ─────────────────────────────────────────────
// データ読み込み
// ─────────────────────────────────────────────
async function loadData() {
  if (!S.pat) { setGhStatus(false, 'PAT 未設定'); return; }

  document.getElementById('keyboard-canvas').innerHTML =
    '<div style="color:var(--muted);font-size:0.85rem;padding:20px 0">読み込み中...</div>';
  setGhStatus(false, '読み込み中...');

  try {
    // レイアウト JSON
    log('レイアウト JSON 取得中...', 'log-info');
    const { content: layoutRaw } = await ghGetFile(LAYOUT_PATH);
    const layoutJson = JSON.parse(layoutRaw);
    S.layoutKeys = layoutJson.layouts.default_layout.layout;
    log(`レイアウト: ${S.layoutKeys.length} キー`, 'log-ok');

    // keymap ファイル
    log('keymap 取得中...', 'log-info');
    const { content: keymapRaw, sha } = await ghGetFile(KEYMAP_PATH);
    S.keymapRaw = keymapRaw;
    S.keymapSha = sha;

    // パース
    S.layers = parseKeymap(keymapRaw);
    S.edits  = {};
    log(`レイヤー: ${S.layers.length} 個`, 'log-ok');
    S.layers.forEach((l, i) =>
      log(`  Layer ${i}: ${l.name}  (${l.bindings.length} キー)`, 'log-info'));

    // レイヤー数とレイアウトキー数が一致しない場合に警告
    for (const [i, l] of S.layers.entries()) {
      if (l.bindings.length !== S.layoutKeys.length) {
        log(
          `⚠ Layer ${i} (${l.name}): bindings=${l.bindings.length} / layout=${S.layoutKeys.length}`,
          'log-warn',
        );
      }
    }

    S.currentLayer = 0;
    setGhStatus(true, 'GitHub 接続済み');
    renderLayerTabs();
    renderKeyboard();
    updateChangeBadge();

  } catch (err) {
    setGhStatus(false, 'エラー');
    log(`読み込みエラー: ${err.message}`, 'log-error');
  }
}

// ─────────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────────
(async () => {
  if (S.pat) {
    document.getElementById('pat-modal').classList.add('hidden');
    document.getElementById('pat-cancel').classList.remove('hidden');
    await loadData();
  }
  // PAT 未設定の場合はモーダルが表示されたまま
})();
